name: PR Merge Auto Bump & Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "The Pull Request number to manually release (e.g., 42)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

# Ensure workflows queue up sequentially if multiple PRs are merged at once
concurrency:
  group: version-bump-and-release
  cancel-in-progress: false

env:
  # Update this to point to your actual version.json path
  VERSION_FILE_PATH: "frontend/data/version.json"

jobs:
  version_bump:
    # Run if it's a manual trigger OR if the PR was actually merged
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.apply_bump.outputs.version }}
      skip: ${{ steps.extract_bump.outputs.skip }}
      # Share fetched PR data with subsequent steps/jobs smoothly
      pr_number: ${{ steps.pr_context.outputs.pr_number }}
      merge_commit_sha: ${{ steps.pr_context.outputs.merge_commit_sha }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch PR Context for Manual Trigger
        id: pr_context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
            echo "Fetching details for manually targeted PR #$PR_NUM..."
            
            # Fetch the PR details using GitHub CLI
            PR_DATA=$(gh pr view "$PR_NUM" --json body,mergeCommit,state --jq '{body: .body, sha: .mergeCommit.oid, state: .state}')
            
            # Sanity check to make sure it was actually a merged PR
            PR_STATE=$(echo "$PR_DATA" | jq -r '.state')
            if [ "$PR_STATE" != "MERGED" ]; then
              echo "::error::PR #$PR_NUM is not merged (Status: $PR_STATE). Exiting."
              exit 1
            fi
            
            PR_BODY=$(echo "$PR_DATA" | jq -r '.body')
            PR_SHA=$(echo "$PR_DATA" | jq -r '.sha')
          else
            # Fallback to standard PR event details
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_BODY="${{ github.event.pull_request.body }}"
            PR_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          fi

          # Save to job outputs and multiline-safe environment variables
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "merge_commit_sha=$PR_SHA" >> $GITHUB_OUTPUT
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "pr_body<<$EOF" >> $GITHUB_ENV
          echo "$PR_BODY" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Extract Version Bump from PR
        id: extract_bump
        run: |
          # Find '## Version Bump', skip empty lines, grab the first non-empty line containing the version
          BUMP=$(echo "$pr_body" | awk '/## Version Bump/{getline; while($0 ~ /^[[:space:]]*$/) getline; print; exit}' | tr -d '\r' | xargs)
          
          if [[ ! "$BUMP" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "No valid version bump format (X.Y.Z) found under '## Version Bump'. Exiting."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Found bump intent: $BUMP"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Calculate and Apply Bump (pwsh)
        if: steps.extract_bump.outputs.skip == 'false'
        id: apply_bump
        shell: pwsh
        run: |
          $bumpInput = "${{ steps.extract_bump.outputs.bump }}"
          $filePath = "${{ env.VERSION_FILE_PATH }}"

          # Initialize file if missing
          if (-not (Test-Path $filePath)) {
              '{"version":"0.0.0","commit":"","date":""}' | Set-Content -Path $filePath
          }

          $jsonContent = Get-Content -Path $filePath -Raw | ConvertFrom-Json

          if ($null -eq $jsonContent -or $jsonContent.GetType().Name -ne "PSCustomObject") {
              $jsonContent = [PSCustomObject]@{
                  version = "0.0.0"
                  commit  = ""
                  date    = ""
              }
          } else {
              $requiredKeys = @('commit', 'date')

              if (-not (Get-Member -InputObject $jsonContent -Name 'version')) {
                  Add-Member -InputObject $jsonContent -NotePropertyName 'version' -NotePropertyValue "0.0.0"
              }

              foreach ($key in $requiredKeys) {
                  if (-not (Get-Member -InputObject $jsonContent -Name $key)) {
                      Add-Member -InputObject $jsonContent -NotePropertyName $key -NotePropertyValue ""
                  }
              }
          }

          $currentParts = $jsonContent.version.Split('.')
          $inputParts = $bumpInput.Split('.')
          
          if ($inputParts.Count -ne 3) {
              Write-Host "Error: Invalid version bump format." -ForegroundColor Red
              exit 1
          }

          $iMajor = [int]$inputParts[0]
          $iMinor = [int]$inputParts[1]
          $iPatch = [int]$inputParts[2]

          $newMajor = [int]$currentParts[0] + $iMajor
          if ($iMajor -gt 0) {
              $newMinor = $iMinor
          } else {
              $newMinor = [int]$currentParts[1] + $iMinor
          }
          if (($iMajor -gt 0) -or ($iMinor -gt 0)) {
              $newPatch = $iPatch
          } else {
              $newPatch = [int]$currentParts[2] + $iPatch
          }

          $newVersionString = "$newMajor.$newMinor.$newPatch"
          $jsonContent.version = $newVersionString
          $jsonContent.commit = "${{ steps.pr_context.outputs.merge_commit_sha }}"
          
          # Force English formatting for consistent ISO 8601 parsing across different runner regions
          $jsonContent.date = (Get-Date).ToUniversalTime().ToString("o")

          $jsonContent | ConvertTo-Json -Depth 10 -Compress | Set-Content -Path $filePath

          Write-Host "New Version: $newVersionString"
          
          # Append to GITHUB_OUTPUT for the next steps
          "version=$newVersionString" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Commit and Push Version Bump
        if: steps.extract_bump.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          NEW_VERSION="${{ steps.apply_bump.outputs.version }}"
          FILE_PATH="${{ env.VERSION_FILE_PATH }}"
          
          git add "$FILE_PATH"
          git commit -m "chore(app): bump version to $NEW_VERSION"
          
          # Rebase right before pushing to resolve extreme race conditions
          git pull --rebase origin main
          git push origin main
  
  build_app:
    needs: version_bump
    if: needs.version_bump.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Dependencies
        shell: bash
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: bun install

      - name: Build App
        shell: bash
        run: |
          bun run build
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: "./dist/releases/v${{ needs.version_bump.outputs.new_version }}/"

  create_release:
    needs: [version_bump, build_app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: "./dist/releases/v${{ needs.version_bump.outputs.new_version }}/"
      
      - name: Fetch PR Commits for Changelog
        id: pr_changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.version_bump.outputs.pr_number }}"
          echo "Fetching commits exclusively for PR #$PR_NUMBER..."
          
          # Formats isolated PR commits exactly like the auto-release.yml logic
          LOGS=$(gh pr view $PR_NUMBER --json commits --jq '.commits[] | "- \(.messageHeadline) ([\(.oid | .[0:7])](https://github.com/${{ github.repository }}/commit/\(.oid)))"')
          
          # Handle multiline output safely
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "logs<<$EOF" >> $GITHUB_OUTPUT
          echo "$LOGS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version_bump.outputs.new_version }}
        run: |
          echo "Creating release v$VERSION..."

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${{ steps.pr_changelog.outputs.logs }}" \
            --target main \
            "./dist/releases/v$VERSION/"*